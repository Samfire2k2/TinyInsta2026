runtime: python310
entrypoint: gunicorn -b :$PORT main:app

instance_class: F1

automatic_scaling:
  min_instances: 0 # Permet de scaler à zéro en cas d'inactivité pour économiser des coûts
  max_instances: 5 # Limite le nombre maximum d'instances pour contrôler le budget du TP
  target_cpu_utilization: 0.6 # Déclenche le scaling quand l'utilisation CPU dépasse 60%
  max_concurrent_requests: 80 # Nombre maximum de requêtes simultanées par instance

handlers:
- url: /
  script: auto
env_variables:
  SEED_TOKEN: "massive-gcp-secret-token"
  SESSION_SECRET: "une-cle-de-session-tres-secrete-pour-flask"
